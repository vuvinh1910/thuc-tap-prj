# Alembic Migration Configuration

[alembic]
script_location = alembic
prepend_sys_path = .
version_path_separator = os
# URL is set programmatically in alembic/env.py via src.config.settings
# Do NOT put real credentials here — use .env file instead
sqlalchemy.url = postgresql+asyncpg://ragbot:ragbot_secret@localhost:5432/ragbot_db

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
